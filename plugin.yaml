apiVersion: v1
type: cli/v1
name: "oci"
version: "0.1.14"
runtime: subprocess
config:
  usage: oci
  shortHelp: "Bookmark and manage OCI Helm chart references"
  longHelp: |-
    Manage local bookmarks for OCI-based Helm charts.
    Never look up an OCI URL again — add it once, then use it by name.
runtimeConfig:
  platformCommand:
    - command: "$HELM_PLUGIN_DIR/bin/helm-oci"
  platformHooks:
    install:
      - command: "$HELM_PLUGIN_DIR/install-binary.sh"
    update:
      - command: "$HELM_PLUGIN_DIR/install-binary.sh"
        args:
          - -u
